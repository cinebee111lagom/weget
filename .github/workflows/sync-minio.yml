name: Sync MinIO Binary

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击触发
  schedule:
    - cron: '0 0 * * 1' # 定时任务：每周一 UTC 时间 0:00 自动运行以同步最新版

jobs:
  sync-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予 Action 创建和写入 Release 的权限

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4

      - name: 2. 下载 MinIO 官方最新二进制文件
        run: |
          wget https://dl.min.io/server/minio/release/linux-amd64/minio
          chmod +x minio
          
      - name: 3. 提取 MinIO 真实版本号
        id: minio_version
        run: |
          # 提取类似 RELEASE.2024-03-07T00-43-48Z 的版本号作为 Tag
          VERSION=$(./minio --version | grep -o 'RELEASE\.[0-9TZ-]*')
          if [ -z "$VERSION" ]; then
            VERSION="latest-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 4. 发布至 GitHub Release 附件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.minio_version.outputs.VERSION }}
          name: MinIO ${{ steps.minio_version.outputs.VERSION }}
          files: minio
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. 动态输出国内专用下载链接
        run: |
          echo "=== 任务执行完毕 ==="
          echo "=========================================================================="
          echo "👉 国内服务器专用极速下载链接 (复制下方链接到国内服务器执行 wget):"
          echo "https://ghproxy.net/https://github.com/${{ github.repository }}/releases/download/${{ steps.minio_version.outputs.VERSION }}/minio"
          echo "=========================================================================="
