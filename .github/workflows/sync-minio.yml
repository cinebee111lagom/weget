name: Universal Downloader

# 触发条件配置
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '📌 请输入海外文件的下载直链 (URL)'
        required: true
        type: string
      file_name:
        description: '📦 请指定保存的文件名 (例如: minio 或 data.zip)'
        required: true
        type: string

jobs:
  download-and-proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须权限：用于发布 Release 附件

    steps:
      - name: 1. 拉取当前仓库
        uses: actions/checkout@v4

      - name: 2. 根据输入的 URL 下载文件
        run: |
          echo "开始下载: ${{ github.event.inputs.target_url }}"
          # 使用 wget 下载，并强制重命名为输入的文件名
          wget -O "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.target_url }}"
          
          # 列出文件检查大小
          ls -lh "${{ github.event.inputs.file_name }}"

      - name: 3. 生成唯一的版本号 (基于时间戳)
        id: generate_tag
        run: |
          # 每次运行生成一个不重复的 Tag，例如 dl-20231024153000
          TAG="dl-$(date +'%Y%m%d%H%M%S')"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: 4. 上传文件到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_tag.outputs.TAG }}
          name: Download Task ${{ steps.generate_tag.outputs.TAG }}
          files: ${{ github.event.inputs.file_name }}
          
      - name: 5. 输出国内加速下载命令
        run: |
          echo "=========================================================================="
          echo "✅ 任务完成！请在你的国内服务器上直接运行以下命令即可下载："
          echo ""
          echo "wget -O ${{ github.event.inputs.file_name }} \"https://ghproxy.net/https://github.com/${{ github.repository }}/releases/download/${{ steps.generate_tag.outputs.TAG }}/${{ github.event.inputs.file_name }}\""
          echo "=========================================================================="
