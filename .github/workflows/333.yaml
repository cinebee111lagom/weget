name: 333

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '📌 请输入海外文件的下载直链 (URL)'
        required: true
        type: string
      file_name:
        description: '📦 请指定保存的文件名 (例如: mc 或 config.zip)'
        required: true
        type: string

jobs:
  download-sync-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 拉取当前代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 根据输入的 URL 下载文件
        run: |
          echo "开始从海外节点下载: ${{ github.event.inputs.target_url }}"
          wget -O "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.target_url }}"
          
          ls -lh "${{ github.event.inputs.file_name }}"

          if [ ! -s "${{ github.event.inputs.file_name }}" ]; then
            echo "❌ 错误：下载的文件大小为 0，请检查填入的 URL 是否有效！"
            exit 1
          fi
          
          # 获取文件大小（单位：MB）
          FILE_SIZE=$(du -m "${{ github.event.inputs.file_name }}" | cut -f1)
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "📊 文件大小: ${FILE_SIZE}MB"

      - name: 3. 生成唯一的版本号
        id: generate_tag
        run: |
          TAG="dl-$(date +'%Y%m%d%H%M%S')"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: 4. 上传文件到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.generate_tag.outputs.TAG }}
          name: Download Task ${{ steps.generate_tag.outputs.TAG }}
          files: ${{ github.event.inputs.file_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. 输出最快的下载命令
        run: |
          FILE_SIZE=${{ env.FILE_SIZE }}
          TAG=${{ steps.generate_tag.outputs.TAG }}
          REPO=${{ github.repository }}
          FILE=${{ github.event.inputs.file_name }}
          
          echo "=========================================================================="
          echo "✅ 任务完成！文件大小: ${FILE_SIZE}MB"
          echo ""
          echo "🚀 【推荐】最快的镜像加速下载（国内超快速）:"
          echo "wget -O ${FILE} \"https://mirror.ghproxy.com/https://github.com/${REPO}/releases/download/${TAG}/${FILE}\""
          echo ""
          echo "📥 备选方案 1（速度较快）:"
          echo "wget -O ${FILE} \"https://ghproxy.net/https://github.com/${REPO}/releases/download/${TAG}/${FILE}\""
          echo ""
          echo "📥 备选方案 2（官方原生直链）:"
          echo "wget -O ${FILE} \"https://github.com/${REPO}/releases/download/${TAG}/${FILE}\""
          echo "=========================================================================="
