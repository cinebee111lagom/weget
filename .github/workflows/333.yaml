name: Universal Downloader (Sync to Aliyun OSS)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '📌 请输入海外文件的下载直链 (URL)'
        required: true
        type: string
      file_name:
        description: '📦 请指定保存的文件名 (例如: mc 或 config.zip)'
        required: true
        type: string

jobs:
  download-and-sync-oss:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 根据输入的 URL 下载海外文件
        run: |
          echo "开始从海外节点下载: ${{ github.event.inputs.target_url }}"
          wget -O "${{ github.event.inputs.file_name }}" "${{ github.event.inputs.target_url }}"
          
          ls -lh "${{ github.event.inputs.file_name }}"
          if [ ! -s "${{ github.event.inputs.file_name }}" ]; then
            echo "❌ 错误：下载的文件大小为 0，请检查填入的 URL 是否有效！"
            exit 1
          fi

      - name: 2. 安装并配置阿里云 OSS 工具 (ossutil)
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_AK: ${{ secrets.OSS_AK }}
          OSS_SK: ${{ secrets.OSS_SK }}
        run: |
          echo "拉取阿里云官方 ossutil 工具..."
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.16/ossutil64
          chmod 755 ossutil64
          
          echo "配置鉴权信息..."
          ./ossutil64 config -e "$OSS_ENDPOINT" -i "$OSS_AK" -k "$OSS_SK" -L CH -c ~/.ossutilconfig

      - name: 3. 多线程极速推送到阿里云 OSS
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          echo "开始将文件推送到 OSS..."
          # 将文件上传到 Bucket 的 root 目录。使用 -f 强制覆盖同名文件
          ./ossutil64 cp "${{ github.event.inputs.file_name }}" "oss://$OSS_BUCKET/${{ github.event.inputs.file_name }}" -f
          echo "✅ 成功推送到阿里云 OSS！"

      - name: 4. 输出国内极速下载命令
        env:
          OSS_DOMAIN: ${{ secrets.OSS_DOMAIN }}
        run: |
          echo "=========================================================================="
          echo "✅ 任务全流程完成！文件已稳稳存入您的阿里云 OSS。"
          echo ""
          echo "🚀 【阿里云 OSS 国内极速直连】 (稳定满带宽):"
          echo "wget -O ${{ github.event.inputs.file_name }} \"https://$OSS_DOMAIN/${{ github.event.inputs.file_name }}\""
          echo "=========================================================================="
